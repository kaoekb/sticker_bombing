image: docker:20.10.16

services:
  - docker:20.10.16-dind

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

stages:
  - build
  - test
  - deploy
  - cleanup

before_script:
  # Логинимся в Docker, если требуется (опционально)
  # - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  - docker info

build:
  stage: build
  script:
    - docker build -t your_image_name:$CI_COMMIT_SHA .
    - docker tag your_image_name:$CI_COMMIT_SHA your_image_name:latest
    # - docker push your_image_name:$CI_COMMIT_SHA
    # - docker push your_image_name:latest

test:
  stage: test
  script:
    - echo "Running tests..."
    - docker run --rm your_image_name:$CI_COMMIT_SHA your_test_command

deploy:
  stage: deploy
  script:
    - docker-compose -f docker-compose.yml up --build -d

cleanup:
  stage: cleanup
  script:
    - docker rmi $(docker images -f "dangling=true" -q) || true
    - docker image prune -a -f
