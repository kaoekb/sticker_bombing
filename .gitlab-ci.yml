stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: Duck_bot

before_script:
  - docker info

build:
  stage: build
  script:
    - docker build -t Duck_bot .
  only:
    - main
    - dev

test:
  stage: test
  script:
    echo "test"
  #   - pip install -r requirements.txt
  #   # - pytest tests  # если у вас есть папка с тестами
  # only:
  #   - main
  #   - dev

deploy:
  stage: deploy
  script:
    - docker-compose -f docker-compose.yml up -d
  only:
    - main
