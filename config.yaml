      Я стикер-бомбардир. Работаю в личке и в группах.

      Как включить:
      /start — включить меня в текущем чате
      В группе я обычно активируюсь сам после добавления

      Что умею:
      /status — показать статус и расписание
      /meme — кинуть случайную фразу
      /bomb — кинуть случайный стикер сразу
      /modes — показать режимы
      /mode <имя> — переключить режим
      /stop — выключить меня в этом чате

      Режимы:
      classic — базовый
      coach — пожестче и пободрее
      philosopher — поспокойнее и глубже
      chaos — контролируемый бардак
