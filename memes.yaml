memes:
  - "Я буду бороться за тебя, как фрикаделька в супе."
  - "Слушай, я не слышал, что ты сказал, но мне пох… Я всё равно умён."
  - "Если бы я был таким крутым, как ты, я бы тоже носил эти штаны."
  - "Это не жизнь, это просто фаза в поисках смысла."
  - "Когда ты думаешь, что всё потеряно, но потом вспоминаешь, что ты всё равно круче всех."
  - "Лучше конец света с сыном на велике, чем с чертями на гелике."
  - "Охранник рынка следит за базаром."
  - "Книга дает знания, а не только знания."
  - "Если заблудился в лесу, иди домой."
  - "Запрет Instagram в России."
  - "Чем богаче дача, тем лучше."
  - "00:00:49 Продолжение шуток"
  - "Не трогай правоохранительные органы, они могут возбудить."
  - "Итоги года знаешь? Я подвел."
  - "Не круто пить, не круто врать, круто маме помогать."
  - "По-настоящему несгибаемым делает межпозвоночная грыжа."
  - "Не бойся ножа, бойся вилки."
  - "Мотоцикл - это транспорт."
  - "Если ушла, не смыл за собой, и я понял, что дышу тобой."
  - "Хороший асфальт на дороге не валяется."
  - "Слово пацана знаешь? Я сказал."
  - "Не стоит рассчитывать на таксистов, они могут подвести."
  - "Не ложусь спать, когда устал, чтобы усталость не думала, что она что-то решает."
  - "Когда меня рожали, тогда я и родился."
  - "За двумя зайцами погонишься, не вытащишь рыбку из пруда."
  - "Нужно делать как нужно, как не нужно, делать не нужно."
  - "Я настоящий экстремал."
  - "Если сделать греческий салат 31 декабря, он станет древнегреческим."
  - "Лучше жопа в тепле, чем тепло в жопе."
  - "Если жена делает тебя счастливым, то какая разница, чья она жена."
  - "Пиджак в кармане, на свай в кармане."
  - "Если есть на свете рай, то это Краснодарский край."
  - "Предложил идею для видео в ТГ, получил тысячу рублей себе."
  - "Сначала потом, затем снова опять."
  - "Братья, не будьте сестрами."
  - "Кто обзывается, тот сам так называется."
  - "Валбере знаешь, я там работаю."
  - "Купил девушке крем для ухода, а она не уходит."
  - "Лучше синица в руках, чем рука в синице."
  - "Взял нож - режь, взял дошик - ешь."
  - "Поссать без пука? Как поесть шашлык без лука."
  - "Только подкаблучник будет отпрашиваться у жены в бар."
  - "Настоящий мужчина и так знает, что нельзя."
  - "Вчера я принял ванну, хотя такой религии не существует."
  - "Решил отдохнуть в воскресенье, это день сделали выходным для всех."
  - "Каждый может кинуть камень волка, но не каждый может кинуть волка в камень."
