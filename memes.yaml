memes:
  - "Я буду бороться за тебя, как фрикаделька в супе."
  - "Слушай, я не слышал, что ты сказал, но мне пох… Я всё равно умён."
  - "Если бы я был таким крутым, как ты, я бы тоже носил эти штаны."
  - "Это не жизнь, это просто фаза в поисках смысла."
  - "Когда ты думаешь, что всё потеряно, но потом вспоминаешь, что ты всё равно круче всех."
  - "Лучше конец света с сыном на велике, чем с чертями на гелике."
  - "Охранник рынка следит за базаром."
  - "Книга дает знания, а не только знания."
  - "Если заблудился в лесу, иди домой."
  - "Чем богаче дача, тем лучше."
  - "Не трогай правоохранительные органы, они могут возбудить."
  - "Итоги года знаешь? Я подвел."
  - "Не круто пить, не круто врать, круто маме помогать."
  - "По-настоящему несгибаемым делает межпозвоночная грыжа."
  - "Не бойся ножа, бойся вилки."
  - "Мотоцикл - это транспорт."
  - "Хороший асфальт на дороге не валяется."
  - "Слово пацана знаешь? Я сказал."
  - "Не стоит рассчитывать на таксистов, они могут подвести."
  - "Не ложусь спать, когда устал, чтобы усталость не думала, что она что-то решает."
  - "Когда меня рожали, тогда я и родился."
  - "За двумя зайцами погонишься, не вытащишь рыбку из пруда."
  - "Нужно делать как нужно, как не нужно, делать не нужно."
  - "Я настоящий экстремал."
  - "Если сделать греческий салат 31 декабря, он станет древнегреческим."
  - "Лучше жопа в тепле, чем тепло в жопе."
  - "Если жена делает тебя счастливым, то какая разница, чья она жена."
  - "Если есть на свете рай, то это Краснодарский край."
  - "Сначала потом, затем снова опять."
  - "Братья, не будьте сестрами."
  - "Кто обзывается, тот сам так называется."
  - "Купил девушке крем для ухода, а она не уходит."
  - "Лучше синица в руках, чем рука в синице."
  - "Взял нож - режь, взял дошик - ешь."
  - "Поссать без пука? Как поесть шашлык без лука."
  - "Только подкаблучник будет отпрашиваться у жены в бар. Настоящий мужчина и так знает, что нельзя."
  - "Вчера я принял ванну, хотя такой религии не существует."
  - "Решил отдохнуть в воскресенье, это день сделали выходным для всех."
  - "Каждый может кинуть камень в волка, но не каждый может кинуть волка в камень."
  - "Я не говорил, что будет легко. Я говорил, что будет интересно."
  - "Мужик сказал — мужик сделал. Не сделал — мужик пошутил."
  - "Пока ты спишь, кто-то качается. Пока ты ешь, кто-то качается. Пока ты качаешься, кто-то качается сильнее."
  - "Если волк молчит, то лучше его не перебивать."
  - "Настоящий мужчина никогда не опаздывает, он задерживается."
  - "Уважаю двух людей: себя и того, кто это читает."
  - "Слабые выбирают безопасный путь. Я же всегда еду по встречке."
  - "Когда мне тяжело, я думаю о том, что у других людей вообще нет моего номера."
  - "Лучше семь раз покрыться потом, чем один раз инеем."
  - "Если тебя никто не ненавидит, значит ты делаешь что-то не так."
  - "Я не боюсь смерти. Я боюсь умереть не вовремя."
  - "В жизни есть два правила: не рассказывай все, что знаешь."
  - "Успех — это когда твоя подпись становится автографом."
  - "Если упал духом, отожмись."
  - "Настоящие друзья — это не те, кто вытащит из драки, а те, кто ударит с тобой вместе."
  - "Не суди по себе, я же не ты."
  - "Не нужно учить меня жизни — она уже пыталась."
  - "Я не смотрю на цену, я смотрю на ценность."
  - "Волка ноги кормят, а Стетхема — ноги волка."
  - "Я не проигрываю, либо побеждаю, либо учусь."
  - "Жизнь слишком коротка, чтобы не быть мной."
  - "Настоящий мужчина не пытается казаться лучше, он просто не похож на других."
  - "Лучше жалеть о том, что сделал, чем о том, чего не сделал."
  - "Я не хожу на тренировки, тренировки ходят ко мне."
  - "Чтобы достичь цели, нужно просто перестать её менять."
  - "Не могу обещать, что решу все проблемы, но могу гарантировать, что создам новые."
  - "Если хочешь, чтобы было сделано хорошо, сделай это сам."
  - "Планы на завтра? Победить."
  - "Если я чего-то хочу, то либо это получу, либо перестану хотеть."
  - "Хочешь победить врага — воспитай его детей."
  - "Меня невозможно победить, можно лишь временно отложить мою победу."
  - "Нельзя купить уважение, но можно купить пиджак, который вызывает уважение."
  - "Не стремись быть идеальным, стремись быть незаменимым."
  - "Везет сильнейшим. Слабым остается надеяться."
  - "В любом деле главное — начать, остальное доделают те, кто слабее."
  - "Я не дерусь. Я проверяю прочность окружающего мира."
  - "Делай сегодня то, что другие не хотят, завтра будешь жить так, как другие не могут."
  - "Когда я сплю, даже мои сны боятся разбудить меня."
  - "Мне не нужен психолог, у меня есть спортзал."
  - "Настоящий боец дерется не потому что ненавидит перед ним стоящего, а потому что уважает стоящих за ним."
  - "Зачем следовать правилам, если можно следовать за мечтой."
  - "Самый лучший удар — это удар первым."
  - "Кто не падал, тот не поднимался."
  - "Молчание — золото. Особенно если слова могут подставить."
  - "Каждый новый день — это шанс изменить свою жизнь, но не для меня, у меня всё идеально."
  - "Счастье любит тишину, поэтому обо мне и слышно так много."
  - "Я никогда не сдаюсь. Просто иногда беру передышку."
  - "Мой лучший советчик — мое отражение."
  - "Настоящая сила внутри, остальное — мускулатура."
  - "Я не ищу оправданий, я нахожу решения."
modes:
  coach:
    title: "Мотивационный тренер"
    description: "Подходит, когда в чате нужен наглый заряд уверенности."
    phrases:
      - "Соберись. Даже дедлайн боится тех, кто встал раньше него."
      - "Если день душит, души день в ответ результатом."
      - "Не ищи вдохновение. Делай так, чтобы вдохновение искало тебя."
      - "Созвон закончится, а репутация машины останется."
      - "Сегодня либо ты продвинешь задачу, либо задача продвинет тебя к нервному тику."
  philosopher:
    title: "Ночной философ"
    description: "Чуть мрачнее, чуть умнее, идеально для поздних разговоров."
    phrases:
      - "Ночь хороша тем, что лишний шум наконец перестает притворяться смыслом."
      - "Иногда лучший план на вечер это признать хаос и все равно сделать один шаг."
      - "Тишина в чате не значит покой. Иногда это просто все устали одинаково."
      - "Если мысль не отпускает ночью, возможно, это уже не мысль, а сосед по квартире."
      - "Мы редко теряем путь сразу. Чаще сначала теряем темп, потом внимание, потом себя."
  chaos:
    title: "Контролируемый хаос"
    description: "Для чатов, где дисциплина давно капитулировала."
    phrases:
      - "План отличный. Осталось убедить реальность сотрудничать."
      - "Сейчас главное не паниковать синхронно."
      - "Любая неразбериха выглядит стратегией, если сказать это уверенным голосом."
      - "Если все сломалось одновременно, значит у дня был художественный замысел."
      - "Это не бардак. Это продвинутый уровень живого процесса."
triggers:
  work:
    keywords:
      - "работ"
      - "созвон"
      - "дейли"
      - "митинг"
      - "дедлайн"
      - "таск"
    phrases:
      - "Работа работой, но легендой дня станет тот, кто переживет этот созвон с прямой спиной."
      - "Дедлайн не конец света. Хотя у них часто одинаковый стиль входа."
      - "Если митинг нельзя отменить, его хотя бы можно пережить с достоинством."
  fatigue:
    keywords:
      - "устал"
      - "заеб"
      - "не вывожу"
      - "спать"
      - "сил нет"
    phrases:
      - "Когда сил нет, побеждает не скорость, а упрямство на минималках."
      - "Иногда геройство это не рывок, а честно дожить до сна."
      - "Если все бесит, значит организм намекает на еду, воду или побег."
  money:
    keywords:
      - "деньги"
      - "зарплат"
      - "преми"
      - "богат"
      - "нищ"
    phrases:
      - "Финансовая стабильность начинается с фразы: я хотя бы помню, куда все делось."
      - "Богат не тот, у кого много денег, а тот, кто не открывает банк с молитвой."
      - "Зарплата это аплодисменты капитализма, только почему-то очень короткие."
